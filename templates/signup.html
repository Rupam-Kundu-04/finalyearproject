{% extends "base.html" %}
{% block title %}Sign Up — GreenPath{% endblock %}
{% block content %}
<div style="max-width: 450px; margin: 4rem auto; padding: 2.5rem; bg: white; background: #fff; border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow-lg);">
    <h2 style="font-family: 'Playfair Display', serif; color: var(--forest); font-size: 2rem; margin-bottom: 0.5rem; font-weight: 700; text-align: center;">Create Account</h2>
    <p style="color: var(--text-muted); font-size: 0.9rem; text-align: center; margin-bottom: 2rem;">Join GreenPath to save your favorite alternative food products.</p>
    
    {% if error %}
    <div style="background: #fee2e2; color: #991b1b; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1.5rem; font-weight: 600;">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" style="display: flex; flex-direction: column; gap: 1.25rem;">
        <div>
            <label style="display: block; font-size: 0.8rem; font-weight: 700; uppercase; color: var(--forest); margin-bottom: 0.4rem; tracking: 0.05em;">Full Name</label>
            <input type="text" name="name" required placeholder="John Doe" style="width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.9rem; outline: none; transition: border-color 0.15s;" onfocus="this.style.borderColor='var(--moss)'" onblur="this.style.borderColor='var(--border)'">
        </div>
        <div>
            <label style="display: block; font-size: 0.8rem; font-weight: 700; uppercase; color: var(--forest); margin-bottom: 0.4rem; tracking: 0.05em;">Email Address</label>
            <input type="email" name="email" required placeholder="you@example.com" style="width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.9rem; outline: none; transition: border-color 0.15s;" onfocus="this.style.borderColor='var(--moss)'" onblur="this.style.borderColor='var(--border)'">
        </div>
        <div>
            <label style="display: block; font-size: 0.8rem; font-weight: 700; uppercase; color: var(--forest); margin-bottom: 0.4rem; tracking: 0.05em;">Password</label>
            <input type="password" name="password" required placeholder="••••••••" style="width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.9rem; outline: none; transition: border-color 0.15s;" onfocus="this.style.borderColor='var(--moss)'" onblur="this.style.borderColor='var(--border)'">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.85rem; font-weight: 700; border-radius: 8px; margin-top: 0.5rem;">Sign Up</button>
    </form>
    
    <p style="text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-top: 1.5rem;">Already have an account? <a href="/signin" style="color: var(--moss); font-weight: 700; text-decoration: underline;">Sign In here</a></p>
</div>
{% endblock %}
